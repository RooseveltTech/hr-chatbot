<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liberty HR Assistant</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background-color: #f0f8ff;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .chat-container {
        width: 100%;
        max-width: 700px;
        height: 100vh;
        background: white;
        display: flex;
        flex-direction: column;
    }

    .chat-header {
        background: #2196F3;
        color: white;
        padding: 16px;
        font-size: 18px;
        text-align: center;
    }

    .chat-body {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
    }

    .message {
        margin-bottom: 12px;
        display: flex;
    }

    .user {
        justify-content: flex-end;
    }

    .user span {
        background: #bbdefb;
        padding: 10px 14px;
        border-radius: 18px 18px 4px 18px;
        max-width: 75%;
        word-wrap: break-word;
        font-size: 14px;
    }

    .bot {
        justify-content: flex-start;
    }

    .bot span {
        background: #e3f2fd;
        padding: 10px 14px;
        border-radius: 18px 18px 18px 4px;
        max-width: 75%;
        word-wrap: break-word;
        font-size: 14px;
    }

    .chat-footer {
        padding: 10px;
        border-top: 1px solid #ddd;
        display: flex;
        gap: 8px;
    }

    input {
        flex: 1;
        padding: 12px;
        border-radius: 20px;
        border: 1px solid #ccc;
        font-size: 14px;
        outline: none;
    }

    input:focus {
        border-color: #2196F3;
    }

    button {
        background: #2196F3;
        color: white;
        border: none;
        padding: 12px 16px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 14px;
        min-width: 70px;
    }

    button:hover {
        background: #1976D2;
    }

    .loading {
        font-size: 12px;
        color: gray;
        margin-top: 5px;
    }

    .typing-indicator {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-bottom: 12px;
    }

    .typing-indicator span {
        width: 8px;
        height: 8px;
        background: #90caf9;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-indicator span:nth-child(1) {
        animation-delay: -0.32s;
    }

    .typing-indicator span:nth-child(2) {
        animation-delay: -0.16s;
    }

    @keyframes bounce {
        0%, 80%, 100% {
            transform: scale(0);
        }
        40% {
            transform: scale(1);
        }
    }

    /* ✅ Extra Mobile Optimization */
    @media (max-width: 480px) {
        .chat-header {
            font-size: 16px;
            padding: 12px;
        }

        .user span,
        .bot span {
            max-width: 85%;
            font-size: 13px;
        }

        input {
            font-size: 13px;
            padding: 10px;
        }

        button {
            font-size: 13px;
            padding: 10px 14px;
        }
    }
</style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        Liberty HR Assistant
    </div>

    <div class="chat-body" id="chat-body"></div>

    <div class="chat-footer">
        <input type="text" id="question" placeholder="Ask HR a question..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("question");
    const chatBody = document.getElementById("chat-body");
    const message = input.value.trim();

    if (!message) return;

    // Add user message
    chatBody.innerHTML += `
        <div class="message user">
            <span>${message}</span>
        </div>
    `;

    input.value = "";
    chatBody.innerHTML += `
    <div class="message bot" id="loading">
        <div class="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
`;
    chatBody.scrollTop = chatBody.scrollHeight;

    try {
        const response = await fetch("/api/chat/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCSRFToken()
            },
            body: JSON.stringify({ question: message })
        });

        const data = await response.json();
        console.log(data)

        document.getElementById("loading").remove();

        chatBody.innerHTML += `
            <div class="message bot">
                <span>${data.answer}</span>
            </div>
        `;

        chatBody.scrollTop = chatBody.scrollHeight;

    } catch (error) {
        document.getElementById("loading").remove();
        chatBody.innerHTML += `
            <div class="message bot">
                <span>Something went wrong. Please try again.</span>
            </div>
        `;
    }
}

function getCSRFToken() {
    return document.querySelector('meta[name="csrf-token"]').getAttribute("content");
}
</script>

</body>
</html>
